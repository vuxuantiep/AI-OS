<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00c758"/>
      <stop offset="100%" stop-color="#00bb7f"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Schatten / Glow hinter dem Kopf -->
  <circle cx="100" cy="90" r="70" fill="#00c758" opacity="0.08" filter="url(#glow)"/>
  
  <!-- Kopf -->
  <rect x="45" y="35" width="110" height="90" rx="24" ry="24" fill="#0d0d0f" stroke="url(#grad)" stroke-width="3"/>
  
  <!-- Antennen -->
  <line x1="70" y1="35" x2="70" y2="18" stroke="#00c758" stroke-width="3" stroke-linecap="round"/>
  <line x1="130" y1="35" x2="130" y2="18" stroke="#00c758" stroke-width="3" stroke-linecap="round"/>
  <circle cx="70" cy="18" r="4" fill="#00c758" filter="url(#glow)"/>
  <circle cx="130" cy="18" r="4" fill="#00c758" filter="url(#glow)"/>
  
  <!-- Augen (groß, freundlich) -->
  <ellipse cx="75" cy="78" rx="14" ry="16" fill="#00c758" filter="url(#glow)"/>
  <ellipse cx="125" cy="78" rx="14" ry="16" fill="#00c758" filter="url(#glow)"/>
  <!-- Pupillen (schauen leicht nach oben) -->
  <circle cx="78" cy="74" r="5" fill="#0d0d0f"/>
  <circle cx="128" cy="74" r="5" fill="#0d0d0f"/>
  <!-- Augenreflex -->
  <circle cx="80" cy="71" r="2" fill="#ffffff" opacity="0.9"/>
  <circle cx="130" cy="71" r="2" fill="#ffffff" opacity="0.9"/>
  
  <!-- Lächeln -->
  <path d="M 82 102 Q 100 118 118 102" stroke="#00c758" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  
  <!-- Körper -->
  <rect x="65" y="135" width="70" height="45" rx="14" ry="14" fill="#0d0d0f" stroke="url(#grad)" stroke-width="3"/>
  
  <!-- Terminal-Detail auf dem Körper -->
  <rect x="82" y="148" width="36" height="8" rx="4" fill="#00c758" opacity="0.9" filter="url(#glow)"/>
  <rect x="82" y="162" width="24" height="4" rx="2" fill="#00c758" opacity="0.5"/>
  
  <!-- Hände -->
  <circle cx="50" cy="150" r="8" fill="#0d0d0f" stroke="url(#grad)" stroke-width="2.5"/>
  <circle cx="150" cy="150" r="8" fill="#0d0d0f" stroke="url(#grad)" stroke-width="2.5"/>
</svg>
