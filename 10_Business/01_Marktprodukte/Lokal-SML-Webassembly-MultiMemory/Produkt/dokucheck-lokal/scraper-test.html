<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🧪 Feed-Scraper-Test (Wasm-Komponente)</title>
<script type="importmap">
{
  "imports": {
    "@bytecodealliance/preview2-shim/cli": "./vendor/preview2-shim/cli.js",
    "@bytecodealliance/preview2-shim/clocks": "./vendor/preview2-shim/clocks.js",
    "@bytecodealliance/preview2-shim/filesystem": "./vendor/preview2-shim/filesystem.js",
    "@bytecodealliance/preview2-shim/http": "./vendor/preview2-shim/http.js",
    "@bytecodealliance/preview2-shim/io": "./vendor/preview2-shim/io.js",
    "@bytecodealliance/preview2-shim/random": "./vendor/preview2-shim/random.js"
  }
}
</script>
<style>
  :root { --bg:#f6f7fb; --card:#fff; --text:#1c2333; --acc:#2f6fed; --ok:#1a9e5c; --err:#c0392b; --line:#e3e7f0; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:system-ui,Segoe UI,sans-serif; background:var(--bg); color:var(--text); }
  .wrap { max-width:760px; margin:0 auto; padding:24px 16px; }
  h1 { font-size:1.3rem; } .sub { color:#5a6478; font-size:.9rem; margin-bottom:18px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:16px; margin-bottom:14px; }
  select,button { font:inherit; padding:9px 14px; border-radius:8px; border:1px solid var(--line); }
  button { background:var(--acc); color:#fff; border:none; cursor:pointer; }
  button:disabled { opacity:.5; }
  #status { margin:10px 0; font-size:.9rem; }
  .ok { color:var(--ok); } .err { color:var(--err); }
  .item { border-top:1px solid var(--line); padding:10px 2px; }
  .item a { color:var(--acc); text-decoration:none; font-weight:600; }
  .item .meta { color:#5a6478; font-size:.8rem; margin:2px 0 4px; }
  .item .txt { font-size:.88rem; }
</style>
</head>
<body>
<div class="wrap">
  <h1>🧪 Feed-Scraper-Test — Wasm-Komponente im Browser</h1>
  <div class="sub">Dieselbe <code>feed-scraper.wasm</code>-Codebasis wie unter Wassette (Desktop),
    per jco für den Browser transpiliert. Benötigt Chrome/Edge (JSPI).</div>

  <div class="card">
    <label>Feed:
      <select id="feed">
        <option value="/feeds/tagesschau">Tagesschau — via Dashboard-Proxy (empfohlen)</option>
        <option value="/feeds/heise">heise online — via Dashboard-Proxy</option>
        <option value="https://www.tagesschau.de/index~rss2.xml">Tagesschau — DIREKT (CORS-Realitätstest, darf scheitern)</option>
      </select>
    </label>
    <button id="laden">📡 Feed laden</button>
    <div id="status">Modul wird geladen …</div>
  </div>

  <div class="card"><div id="ergebnis"><em>Noch keine Items geladen.</em></div></div>
</div>

<script type="module">
  const status = document.getElementById("status");
  const ergebnis = document.getElementById("ergebnis");
  const btn = document.getElementById("laden");
  const esc = s => s.replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
  let scraper = null;
  try {
    ({ scraper } = await import("./scraper/feed-scraper.js"));
    status.innerHTML = '<span class="ok">✅ Wasm-Komponente geladen — bereit.</span>';
    btn.disabled = false;
  } catch (e) {
    status.innerHTML = '<span class="err">❌ Modul-Ladefehler: ' + esc(String(e)) + "</span>";
  }
  btn.addEventListener("click", async () => {
    const url = document.getElementById("feed").value;
    btn.disabled = true;
    status.textContent = "⏳ hole " + url + " …";
    const t0 = performance.now();
    try {
      // Browser-Pfad: Seite holt den Feed (Browser/CORS = Netz-Sandbox),
      // die Wasm-Komponente parst. Desktop nutzt fetchFeed unter Wassette.
      const resp = await fetch(url);
      if (!resp.ok) throw "HTTP " + resp.status;
      const items = scraper.parseFeed(await resp.text());
      const ms = Math.round(performance.now() - t0);
      status.innerHTML = '<span class="ok">✅ ' + items.length + " Items in " + ms + " ms</span>";
      ergebnis.innerHTML = items.slice(0, 10).map(i =>
        '<div class="item"><a href="' + esc(i.link) + '" target="_blank" rel="noopener">' + esc(i.titel) + "</a>" +
        '<div class="meta">' + esc(i.datum) + "</div>" +
        '<div class="txt">' + esc(i.text.slice(0, 220)) + "…</div></div>").join("");
    } catch (e) {
      status.innerHTML = '<span class="err">❌ ' + esc(String(e)) + "</span>";
      ergebnis.innerHTML = "<em>Fehler — bei „DIREKT“ ist das der erwartete CORS-Beweis.</em>";
    } finally { btn.disabled = false; }
  });
  const qp = new URLSearchParams(location.search);
  if (qp.get("feed")) {
    const sel = document.getElementById("feed"), o = document.createElement("option");
    o.value = qp.get("feed"); o.textContent = "Test: " + qp.get("feed");
    sel.append(o); sel.value = o.value;
  }
  if (scraper && qp.has("auto")) btn.click();
</script>
</body>
</html>
