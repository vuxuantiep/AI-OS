<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<title>Broki AI</title>
<style>
  :root {
    --bg-deep:#f7faf8; --bg:#eef4ef; --bg-card:#fff; --bg-elevated:#f3f7f4; --border:#dbe6dd;
    --acc:#00a548; --acc-soft:#00915f; --ok:#16a34a; --warn:#ca8a04; --danger:#dc2626;
    --text:#10151f; --text-dim:#3a4252; --text-muted:#6a7080;
  }
  body.dark {
    --bg-deep:#050e14; --bg:#081119; --bg-card:#0a141d; --bg-elevated:#0e1a25; --border:#1a2a38;
    --acc:#00c758; --acc-soft:#4ade80; --ok:#4ade80; --warn:#facc15; --danger:#f87171;
    --text:#fff; --text-dim:#ccc; --text-muted:#888890;
  }
  * { box-sizing: border-box; }
  body { margin:0; font-family:"Inter",system-ui,-apple-system,sans-serif; font-size:13px;
    color:var(--text); background:var(--bg-deep); display:flex; flex-direction:column; height:100vh;
    transition:background .2s,color .2s; }
  code, .mono { font-family:"JetBrains Mono",ui-monospace,monospace; }

  /* HEADER */
  header { display:flex; align-items:center; gap:8px; padding:10px 12px;
    border-bottom:1px solid var(--border); background:var(--bg-card); flex-shrink:0; }
  header .logo-dot { width:9px; height:9px; border-radius:50%; background:var(--acc);
    box-shadow:0 0 6px rgba(0,199,88,.6); flex-shrink:0; }
  header h1 { font-size:14px; font-weight:800; margin:0; flex:1; letter-spacing:-.01em; }
  header h1 b { color:var(--acc); }
  .icon-btn { background:transparent; border:1px solid var(--border); color:var(--text);
    font-size:12px; padding:5px 7px; border-radius:7px; cursor:pointer; }
  .icon-btn:hover { border-color:var(--acc); }
  .mode-toggle { font-size:11px; cursor:pointer; padding:5px 6px; border-radius:7px;
    border:1px solid var(--border); background:var(--bg-card); color:inherit; }
  #tresor { font-size:11px; cursor:pointer; user-select:none; display:flex; align-items:center; gap:4px; }

  /* 4-SÄULEN STATUSLEISTE */
  .saeulen { display:grid; grid-template-columns:1fr 1fr; gap:1px; background:var(--border);
    border-bottom:1px solid var(--border); flex-shrink:0; }
  .saeule { background:var(--bg); padding:7px 9px; display:flex; gap:6px; align-items:flex-start; }
  .saeule .punkt { width:6px; height:6px; border-radius:50%; margin-top:4px; flex-shrink:0; }
  .saeule .punkt.aktiv { background:var(--ok); }
  .saeule .punkt.teil { background:var(--warn); }
  .saeule .txt { min-width:0; }
  .saeule .label { font-size:9px; text-transform:uppercase; letter-spacing:.07em;
    color:var(--text-muted); font-weight:700; }
  .saeule .wert { font-size:11px; color:var(--text-dim); line-height:1.3; margin-top:1px;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .saeule .roadmap { font-size:9.5px; color:var(--text-muted); margin-top:1px; font-style:italic; }

  #banner { display:none; padding:8px 12px; font-size:12px; color:#05130a; background:var(--warn); }

  /* CHAT */
  #chat { flex:1; overflow-y:auto; padding:10px 12px; }
  .msg { margin:8px 0; padding:9px 11px; border-radius:11px; background:var(--bg-card);
    border:1px solid var(--border); white-space:pre-wrap; line-height:1.5; }
  .msg.ich { background:var(--bg-elevated); margin-left:14%; }
  .msg.broki { border-color:rgba(0,199,88,.25); background:rgba(0,199,88,.06); margin-right:8%; }
  .meta { font-size:10.5px; color:var(--text-muted); margin-top:5px; }
  #chat button { margin-top:4px; padding:7px 12px; border:none; border-radius:8px;
    background:var(--acc); color:#05130a; font-weight:600; cursor:pointer; font-size:12px; }

  /* EINGABE */
  form { display:flex; gap:6px; padding:10px 12px; border-top:1px solid var(--border);
    background:var(--bg-card); flex-shrink:0; }
  input[type=text] { flex:1; padding:8px 10px; border:1px solid var(--border); border-radius:8px;
    background:var(--bg); color:var(--text); font-family:inherit; font-size:13px; }
  input[type=text]:focus { outline:none; border-color:var(--acc); }
  button[type=submit] { padding:8px 13px; border:none; border-radius:8px; background:var(--acc);
    color:#05130a; font-weight:700; cursor:pointer; }

  #status { padding:6px 12px; font-size:10.5px; color:var(--text-muted);
    border-top:1px solid var(--border); background:var(--bg-card); flex-shrink:0; }
</style>
</head>
<body>
  <header>
    <span class="logo-dot"></span>
    <h1>Broki <b>AI</b></h1>
    <label id="tresor"><input type="checkbox" id="privat"> 🔒 Privat</label>
    <select id="modeSelect" class="mode-toggle" title="KI-Modus">
      <option value="local">🖥️ Nur Lokal</option>
      <option value="cloud">☁️ Cloud (Fallback)</option>
    </select>
    <button type="button" id="themeToggle" class="icon-btn" title="Design umschalten">🌓</button>
  </header>

  <!-- 4-Säulen-Framework: zeigt den ECHTEN Ausbaustand, nicht mehr als gebaut ist -->
  <div class="saeulen">
    <div class="saeule">
      <span class="punkt aktiv"></span>
      <div class="txt">
        <div class="label">Continuity</div>
        <div class="wert mono" id="saeule-continuity">Bereit — lädt bei erster Frage</div>
      </div>
    </div>
    <div class="saeule">
      <span class="punkt teil"></span>
      <div class="txt">
        <div class="label">Resilience</div>
        <div class="wert" id="saeule-resilience">Tresor: Aus</div>
        <div class="roadmap">Daten-Filter: in Entwicklung</div>
      </div>
    </div>
    <div class="saeule">
      <span class="punkt teil"></span>
      <div class="txt">
        <div class="label">Agility</div>
        <div class="wert">Auf jeder Seite aktiv</div>
        <div class="roadmap">Kontext-Erkennung: in Entwicklung</div>
      </div>
    </div>
    <div class="saeule">
      <span class="punkt aktiv"></span>
      <div class="txt">
        <div class="label">Adaptability</div>
        <div class="wert mono" id="saeule-adaptability">Lade Index …</div>
        <div class="roadmap">Hermes-Feedback: in Entwicklung</div>
      </div>
    </div>
  </div>

  <div id="banner"></div>
  <div id="chat"></div>
  <form id="frageForm">
    <input type="text" id="frage" placeholder="Frag das Firmen-Wiki …" autocomplete="off">
    <button type="submit">➤</button>
  </form>
  <div id="status">Lade Status …</div>
  <script src="sidebar.js" type="module"></script>
</body>
</html>
