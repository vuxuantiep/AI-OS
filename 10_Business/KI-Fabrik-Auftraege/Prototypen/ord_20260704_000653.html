<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧪 Prototyp — KI-Fabrik Testumgebung</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background-color: #f9f9f9;
            border: 1px solid #ddd;
            box-shadow: 0 2px 4px rgba(0, 0, 0, .06);
        }
        
        .kanban-board {
            display: flex;
            justify-content: space-between;
            padding: 20px;
        }
        
        .task-list {
            width: 300px;
            height: 400px;
            overflow-y: auto;
            border: 1px solid #ddd;
            padding: 10px;
        }
        
        .status-spans {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }
        
        .progress-bar {
            width: 100%;
            height: 20px;
            background-color: #ccc;
            border-radius: 10px;
            overflow: hidden;
        }
    </style>
</head>
<body><div style="position:fixed;top:8px;right:8px;z-index:99999;background:rgba(17,17,17,0.85);color:#fff;padding:4px 12px;border-radius:14px;font:600 12px sans-serif;">🏭 Prototyp v3 · ord_20260704_000653</div>
    <div class="container">
        <h1>🧪 Prototyp — KI-Fabrik Testumgebung</h1>
        <div class="kanban-board">
            <div class="task-list">
                <ul>
                    <li>Aufgabe 1: In Bearbeitung</li>
                    <li>Aufgabe 2: Erledigt</li>
                    <li>Aufgabe 3: In Bearbeitung</li>
                </ul>
            </div>
            <div class="status-spans">
                <span>In Bearbeitung (3)</span>
                <span>Erledigt (1)</span>
                <span>Fertig (0)</span>
            </div>
            <div class="progress-bar" style="width: 60%;"></div>
        </div>
        <button onclick="filterTasks('In Bearbeitung')">Filter nach "In Bearbeitung"</button>
        <button onclick="filterTasks('Erledigt')">Filter nach "Erledigt"</button>
    </div>
    
    <script>
        function filterTasks(status) {
            const taskList = document.querySelector('.task-list ul');
            taskList.innerHTML = '';
            for (const task of tasks) {
                if (task.status === status) {
                    taskList.appendChild(document.createElement('li')).textContent = task.name;
                }
            }
        }
        
        const tasks = [
            { name: 'Aufgabe 1', status: 'In Bearbeitung' },
            { name: 'Aufgabe 2', status: 'Erledigt' },
            { name: 'Aufgabe 3', status: 'In Bearbeitung' },
        ];
    </script>
</body>
</html>
